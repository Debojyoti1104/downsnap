name: Daily Render Reboot & yt-dlp Update

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to trigger it manually from the Actions tab

jobs:
  reboot:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "Error: RENDER_DEPLOY_HOOK secret is not set in GitHub Settings!"
            exit 1
          fi
          echo "Pinging Render Deploy Hook to trigger a fresh build and yt-dlp upgrade..."
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
