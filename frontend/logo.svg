<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="DownSnap logo">
  <title>DownSnap — Free Any Video Downloader</title>
  <defs>
    <!-- Background gradient: light purple → deep indigo -->
    <linearGradient id="ds-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#9183FF"/>
      <stop offset="100%" stop-color="#3A30C0"/>
    </linearGradient>
    <!-- Counter fill gradient (same family, slightly darker) -->
    <linearGradient id="ds-inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#5E54D8"/>
      <stop offset="100%" stop-color="#2B24A0"/>
    </linearGradient>
    <!-- Lens highlight gradient -->
    <radialGradient id="ds-lens-glow" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.00"/>
    </radialGradient>
    <!-- Clip the aperture blades to the inner lens circle -->
    <clipPath id="ds-lens-clip">
      <circle cx="55" cy="50" r="18"/>
    </clipPath>
  </defs>

  <!-- ── Background rounded square ───────────────── -->
  <rect width="100" height="100" rx="20" ry="20" fill="url(#ds-bg)"/>

  <!-- ── Subtle inner shadow / depth ring ─────────── -->
  <rect width="100" height="100" rx="20" ry="20"
        fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.12"/>

  <!-- ── Bold letter D  (solid white) ─────────────── -->
  <!-- Outer D shape: left stem + sweeping Bezier curve -->
  <path d="M13,11 L13,89 L45,89
           C88,89 88,11 45,11 Z"
        fill="white"/>

  <!-- ── D counter (hollow centre) ────────────────── -->
  <!-- Slightly smaller matching curve, filled with inner gradient -->
  <path d="M22,20 L22,80 L45,80
           C74,80 74,20 45,20 Z"
        fill="url(#ds-inner)"/>

  <!-- ── Camera lens inside the D counter ─────────── -->

  <!-- Outer lens rim -->
  <circle cx="55" cy="50" r="21" fill="none" stroke="white" stroke-width="1.2" stroke-opacity="0.30"/>

  <!-- Aperture blades — 6 curved "leaf" shapes, clipped to lens circle -->
  <g clip-path="url(#ds-lens-clip)" fill="white" fill-opacity="0.18">
    <!-- Each blade: a narrow teardrop from near-center to rim, rotated 60° steps -->
    <path d="M55,32 Q59,41 55,50 Q51,41 55,32 Z"/>
    <path d="M55,32 Q59,41 55,50 Q51,41 55,32 Z" transform="rotate(60  55 50)"/>
    <path d="M55,32 Q59,41 55,50 Q51,41 55,32 Z" transform="rotate(120 55 50)"/>
    <path d="M55,32 Q59,41 55,50 Q51,41 55,32 Z" transform="rotate(180 55 50)"/>
    <path d="M55,32 Q59,41 55,50 Q51,41 55,32 Z" transform="rotate(240 55 50)"/>
    <path d="M55,32 Q59,41 55,50 Q51,41 55,32 Z" transform="rotate(300 55 50)"/>
  </g>

  <!-- Middle lens ring -->
  <circle cx="55" cy="50" r="14" fill="none" stroke="white" stroke-width="1.2" stroke-opacity="0.35"/>

  <!-- Inner lens ring / iris -->
  <circle cx="55" cy="50" r="8"  fill="none" stroke="white" stroke-width="1.2" stroke-opacity="0.45"/>

  <!-- Lens glass highlight -->
  <circle cx="55" cy="50" r="18" fill="url(#ds-lens-glow)"/>

  <!-- ── Download arrow (snap ↓) inside lens ────────── -->
  <!-- Shaft -->
  <line x1="55" y1="43" x2="55" y2="55"
        stroke="white" stroke-width="3.2" stroke-linecap="round"/>
  <!-- Arrowhead -->
  <polyline points="50,51 55,57 60,51"
            fill="none" stroke="white" stroke-width="3.2"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Tiny lens centre dot -->
  <circle cx="55" cy="50" r="2.2" fill="white" fill-opacity="0.6"/>

  <!-- Camera "shutter button" notch on top-left of D stem (snap detail) -->
  <rect x="13" y="23" width="9" height="5" rx="2.5" fill="white" fill-opacity="0.35"/>
</svg>
